<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻花樹下的邂逅 - 戀愛互動故事</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 飄落的花瓣由 JavaScript 動態生成 -->
    
    <div class="container">
        <div id="game-area" class="card">
            <h1 id="story-title">櫻花樹下的邂逅</h1>
            <div class="title-decorator"></div>
            
            <div id="story-text" class="text-content">
                <p>歡迎來到這個校園文字戀愛互動故事。<br><br>你的每一個決定，都會引導故事走向不同的分歧點。<br>準備好迎接你的青春校園物語了嗎？</p>
            </div>
            
            <div id="choices-area" class="button-group">
                <button class="choice-btn" onclick="startGame()">開始體驗</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
